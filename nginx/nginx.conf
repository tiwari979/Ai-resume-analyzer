# ============================================================
# NGINX API Gateway - AI Resume Analyzer
# Routes all incoming requests to appropriate microservices
# ============================================================

upstream user_service {
    server user-service:3001;
}

upstream resume_service {
    server resume-service:3002;
}

upstream ai_service {
    server ai-service:3003;
}

upstream frontend {
    server frontend:80;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    # ---- API Routes ----

    # User Service: /api/auth/*
    location /api/auth/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Resume Service: /api/resume/*
    location /api/resume/ {
        limit_req zone=upload_limit burst=3 nodelay;
        proxy_pass http://resume_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;  # Allow longer for PDF processing + AI
        proxy_connect_timeout 10s;
    }

    # AI Service: /api/ai/* (internal, but exposed for debugging)
    location /api/ai/ {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Health checks for all services
    location /health/user {
        proxy_pass http://user_service/health;
    }

    location /health/resume {
        proxy_pass http://resume_service/health;
    }

    location /health/ai {
        proxy_pass http://ai_service/health;
    }

    # NGINX status for Prometheus scraping
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;  # Docker network
        deny all;
    }

    # Frontend (React SPA) — must be LAST
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

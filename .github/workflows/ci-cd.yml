name: CI/CD - AI Resume Analyzer

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ai-resume-analyzer

jobs:
  # ============================================================
  # JOB 1: Lint & Test all services
  # ============================================================
  test:
    name: Test Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, resume-service, ai-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package.json

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: npm install

      - name: Run linter (if configured)
        working-directory: ./${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests (if configured)
        working-directory: ./${{ matrix.service }}
        run: npm test --if-present

  # ============================================================
  # JOB 2: Build Docker images
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [user-service, resume-service, ai-service, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: Integration test with docker-compose
  # ============================================================
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30

      - name: Test user-service health
        run: curl -f http://localhost:80/health/user

      - name: Test resume-service health
        run: curl -f http://localhost:80/health/resume

      - name: Test ai-service health
        run: curl -f http://localhost:80/health/ai

      - name: Test registration flow
        run: |
          curl -f -X POST http://localhost:80/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"test@test.com","password":"password123"}'

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down
